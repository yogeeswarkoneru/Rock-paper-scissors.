<!doctype html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles/12-rock-paper-scissors.css" />
    <style></style>
  </head>
  <body>
    <p class="play">Rock Paper Scissors</p>
    <button onclick="playGame('rock')" class="image" title="rock">
      <img class="rock-image" src="images/rock-emoji.png" />
    </button>
    <button
      onclick="playGame('paper')"
      class="image-paper"
      title="paper"
      onkeydown="
        if (event.key === 'p') {
          playGame('paper');
        }
      "
    >
      <img class="paper-image box" src="images/paper-emoji.png" />
    </button>
    <button
      onclick="playGame('scissors')"
      class="image-scissors"
      title="scissors"
    >
      <img class="scissors-image" src="images/scissors-emoji.png" />
    </button>
    <p class="js-result"></p>
    <p class="js-moves"></p>
    <p class="js-score score"></p>
    <button
      onclick="
        score.wins = 0;
        score.lose = 0;
        score.tie = 0;
        localStorage.removeItem('score'); // Clear from localStorage on reset

        alert(`Score reset! \n wins : 0, lose : 0, tie : 0.`);
        UpdateScore();
      "
      class="reset-button"
      title="Click to reset your score"
    >
      Reset score
    </button>
    <button
      class="auto-play-button"
      title="Click to start auto play"
      onclick="autoPlay()"
    >
      Auto Play
    </button>

    <marquee class="marquee">Have Fun Enjoy The Game...</marquee>
    <script>
      // 1. Load the score from localStorage, or use default values if it doesn't exist yet
      const score = JSON.parse(localStorage.getItem("score")) || {
        wins: 0,
        lose: 0,
        tie: 0,
      };

      UpdateScore();

      function playGame(playerMove) {
        const computerMove = pickComputerMove();
        let result = "";
        if (playerMove === "scissors") {
          if (computerMove === "rock") {
            result = "you lose.";
          } else if (computerMove === "paper") {
            result = "you win.";
          } else if (computerMove === "scissors") {
            result = "Tie.";
          }
        } else if (playerMove === "paper") {
          if (computerMove === "rock") {
            result = "you win.";
          } else if (computerMove === "paper") {
            result = "Tie.";
          } else if (computerMove === "scissors") {
            result = "you lose.";
          }
        } else if (playerMove === "rock") {
          if (computerMove === "rock") {
            result = "Tie.";
          } else if (computerMove === "paper") {
            result = "you lose.";
          } else if (computerMove === "scissors") {
            result = "you win.";
          }
        }
        if (result === "you win.") {
          score.wins += 1;
        } else if (result === "you lose.") {
          score.lose += 1;
        } else if (result === "Tie.") {
          score.tie += 1;
        }

        // 2. Save the updated score to localStorage every time a game is played
        localStorage.setItem("score", JSON.stringify(score));

        document.querySelector(".js-result").innerHTML = result;

        // Note: Fixes a small glitch where multiple elements had class "js-moves"
        document.querySelector("p.js-moves").innerHTML = `you
      <img src="images/${playerMove}-emoji.png"  class="rock-image" />.
      <img src="images/${computerMove}-emoji.png" class="scissors-image" /> Computer ..`;
        UpdateScore();
      }

      function UpdateScore() {
        document.querySelector(".js-score").innerHTML =
          `wins : ${score.wins}, lose : ${score.lose}, tie : ${score.tie}`;
      }

      function pickComputerMove() {
        const randomNumber = Math.random();

        let computerMove = "";

        if (randomNumber >= 0 && randomNumber < 1 / 3) {
          computerMove = "rock";
        } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
          computerMove = "paper";
        } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
          computerMove = "scissors";
        }
        return computerMove;
      }
      let isAutoPlaying = false;
      let intervalId;
      function autoPlay() {
        if (!isAutoPlaying) {
          intervalId = setInterval(() => {
            const playerMove = pickComputerMove();
            playGame(playerMove);
          }, 1100);
          isAutoPlaying = true;
        } else {
          clearInterval(intervalId);
          isAutoPlaying = false;
        }
      }
      // Add the event listener to the body
      document.body.addEventListener("keydown", (event) => {
        if (event.key === "a") {
          autoPlay();
        } else if (event.key === "r") {
          playGame("rock");
        } else if (event.key === "p") {
          playGame("paper");
        } else if (event.key === "s") {
          playGame("scissors");
        } else if (event.key === "Enter") {
          // Reset score on Enter key press
          score.wins = 0;
          score.lose = 0;
          score.tie = 0;
          localStorage.removeItem("score"); // Clear from localStorage on reset

          alert(`Score reset! \n wins : 0, lose : 0, tie : 0.`);
          UpdateScore();
        }
      });
    </script>
  </body>
</html>
